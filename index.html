<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOVA | Fábrica de Dinheiro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        .gold-text { background: linear-gradient(135deg, #bf953f, #fcf6ba, #b38728); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .glass-card { background: rgba(255, 255, 255, 0.02); border: 1px solid rgba(191, 149, 63, 0.2); border-radius: 24px; }
        .btn-gold { background: linear-gradient(135deg, #bf953f, #aa771c); color: #000; font-weight: 900; transition: 0.4s; cursor: pointer; border: none; }
        .btn-gold:hover { filter: brightness(1.2); box-shadow: 0 0 30px rgba(191, 149, 63, 0.3); }
        .field { background: rgba(255,255,255,0.05); border: 1px solid #333; border-radius: 12px; padding: 14px; width: 100%; outline: none; color: white; margin-bottom: 15px; display: block; font-size: 14px; }
        .field:focus { border-color: #bf953f; }
        select.field { appearance: auto !important; background-color: #1a1a1a; color: white; }
        .lang-btn { cursor: pointer; opacity: 0.4; transition: 0.3s; font-size: 24px; display: inline-block; }
        .lang-btn.active { opacity: 1; transform: scale(1.2); filter: drop-shadow(0 0 8px #bf953f); }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center p-4">

    <nav class="w-full max-w-2xl flex justify-center gap-10 py-8">
        <span onclick="setLang('pt')" id="l-pt" class="lang-btn active" title="Português">🇧🇷</span>
        <span onclick="setLang('en')" id="l-en" class="lang-btn" title="English">🇺🇸</span>
        <span onclick="setLang('es')" id="l-es" class="lang-btn" title="Español">🇪🇸</span>
    </nav>

    <header class="text-center mb-10 w-full">
        <h1 class="text-4xl md:text-6xl font-900 tracking-tighter uppercase italic gold-text mb-2">Fábrica de Dinheiro</h1>
        <p id="sub-tag" class="text-gray-400 tracking-[0.1em] text-xs md:text-sm uppercase">
            Estratégia <span class="text-white font-black">NOVA</span> de Alta <span class="text-white font-black">CONVERSÃO</span>
        </p>
    </header>

    <main class="w-full max-w-xl glass-card p-6 md:p-10 shadow-2xl">
        <div id="input-view">
            <p id="label-param" class="text-[#bf953f] font-bold mb-8 text-center uppercase tracking-widest text-[10px]">Parâmetros de Produção</p>
            
            <label id="label-p1" class="text-[10px] text-gray-500 uppercase ml-1">1. O Produto</label>
            <input type="text" id="p1" class="field" placeholder="Ex: Vestido de Noiva...">
            
            <label id="label-p2" class="text-[10px] text-gray-500 uppercase ml-1">2. Diferencial Real</label>
            <input type="text" id="p2" class="field" placeholder="Ex: Faz você se sentir uma rainha...">
            
            <label id="label-p3" class="text-[10px] text-gray-500 uppercase ml-1">3. Público Alvo</label>
            <input type="text" id="p3" class="field" placeholder="Ex: Noivas sofisticadas...">
            
            <label id="label-p4" class="text-[10px] text-gray-500 uppercase ml-1">4. Tom de Voz</label>
            <select id="p4" class="field">
                <option value="sofisticado">Sofisticado</option>
                <option value="simples">Simples</option>
            </select>

            <button onclick="gerar()" id="btn-acao" class="w-full btn-gold py-5 rounded-xl text-lg uppercase italic mt-6">Ativar Produção</button>
        </div>

        <div id="result-view" class="hidden">
            <div id="output" class="text-gray-200 text-lg leading-relaxed italic mb-10 whitespace-pre-line font-light p-4 bg-white/5 rounded-lg border border-white/10"></div>
            <button onclick="reset()" id="btn-nova-ordem" class="w-full text-gray-600 text-[10px] uppercase tracking-[0.5em] font-bold hover:text-white transition">Nova Ordem de Produção</button>
        </div>
    </main>

    <script>
        // CHAVE DE ACESSO (SUBSTITUÍDA)
        const apiKey = "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";

        function setLang(lang) {
            document.querySelectorAll('.lang-btn').forEach(b => b.classList.remove('active'));
            document.getElementById('l-' + lang).classList.add('active');
            
            const texts = {
                pt: { sub: 'Estratégia <span class="text-white font-black">NOVA</span> de Alta <span class="text-white font-black">CONVERSÃO</span>', btn: 'Ativar Produção', param: 'Parâmetros de Produção', n: 'Nova Ordem', p1: '1. O Produto', p2: '2. Diferencial Real', p3: '3. Público Alvo', p4: '4. Tom de Voz' },
                en: { sub: 'NEW <span class="text-white font-black">CONVERSION</span> Strategy', btn: 'Activate Production', param: 'Production Parameters', n: 'New Order', p1: '1. Product', p2: '2. Real Difference', p3: '3. Target Audience', p4: '4. Tone' },
                es: { sub: 'Estrategia <span class="text-white font-black">NOVA</span> de Alta <span class="text-white font-black">CONVERSIÓN</span>', btn: 'Activar Producción', param: 'Parámetros de Producción', n: 'Nueva Orden', p1: '1. Producto', p2: '2. Diferencial Real', p3: '3. Público Objetivo', p4: '4. Tono' }
            };
            
            const t = texts[lang];
            document.getElementById('sub-tag').innerHTML = t.sub;
            document.getElementById('btn-acao').innerText = t.btn;
            document.getElementById('label-param').innerText = t.param;
            document.getElementById('btn-nova-ordem').innerText = t.n;
            document.getElementById('label-p1').innerText = t.p1;
            document.getElementById('label-p2').innerText = t.p2;
            document.getElementById('label-p3').innerText = t.p3;
            document.getElementById('label-p4').innerText = t.p4;
        }

        async function gerar() {
            const p1 = document.getElementById('p1').value;
            const p2 = document.getElementById('p2').value;
            const p3 = document.getElementById('p3').value;
            const p4 = document.getElementById('p4').value;

            if(!p1 || !p2) { alert("Por favor, preencha o produto e o diferencial."); return; }

            const btn = document.getElementById('btn-acao');
            btn.innerText = "PROCESSANDO..."; btn.disabled = true;

            try {
                const response = await fetch('https://api.openai.com/v1/chat/completions', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json', 
                        'Authorization': 'Bearer ' + apiKey 
                    },
                    body: JSON.stringify({
                        model: "gpt-3.5-turbo",
                        messages: [
                            {role: "system", content: "Você é um copywriter de elite da marca NOVA. Crie headlines e textos de alta conversão. Seja persuasivo e use gatilhos mentais de luxo."},
                            {role: "user", content: `Produto: ${p1}. Diferencial: ${p2}. Público: ${p3}. Tom: ${p4}.`}
                        ],
                        temperature: 0.8
                    })
                });
                
                const data = await response.json();
                if(data.error) throw new Error(data.error.message);

                document.getElementById('input-view').classList.add('hidden');
                document.getElementById('result-view').classList.remove('hidden');
                document.getElementById('output').innerText = data.choices[0].message.content;
                
            } catch (e) {
                alert("Erro na Fábrica: Vá no menu Security do GitHub e libere a chave (Close Alert).");
                console.error(e);
                reset();
            }
        }

        function reset() {
            document.getElementById('input-view').classList.remove('hidden');
            document.getElementById('result-view').classList.add('hidden');
            document.getElementById('btn-acao').innerText = "Ativar Produção";
            document.getElementById('btn-acao').disabled = false;
        }
    </script>
</body>
</html>
